<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso de Usuarios - Conexión Supabase</title>
    <link rel="stylesheet" href="sesionusuario.css">
</head>
<body>
    <section class="autenticacion-container" id="panel-principal">
        
        <section class="formulario-wrapper registro-lado">
            <form id="form-registro" class="formulario-contenido">
                <h1 class="texto-titulo">Registrarse</h1>
                <span class="texto-ayuda">Use su correo electrónico para registrarse</span>
                <input type="text" id="reg-username" class="campo-entrada" placeholder="Nombre de usuario" required />
                <input type="email" id="reg-email" class="campo-entrada" placeholder="Email" required />
                <input type="password" id="reg-password" class="campo-entrada" placeholder="Contraseña" required />
                <button type="submit" class="boton-accion">REGISTRARSE</button>
            </form>
        </section>

        <section class="formulario-wrapper login-lado">
            <form id="form-login" class="formulario-contenido">
                <h1 class="texto-titulo">Iniciar Sesión</h1>
                <span class="texto-ayuda">Use su correo y contraseña</span>
                <input type="email" id="log-email" class="campo-entrada" placeholder="Email" required />
                <input type="password" id="log-password" class="campo-entrada" placeholder="Contraseña" required />
                <button type="submit" class="boton-accion">INICIAR SESIÓN</button>
            </form>
        </section>

        <div class="capa-interactiva-contenedor">
            <div class="capa-interactiva-fondo">
                <div class="info-panel info-izquierda">
                    <h1 class="texto-blanco">¡Hola!</h1>
                    <p class="texto-parrafo">Regístrese con sus datos personales para usar todas las funciones del sitio</p>
                    <button class="boton-outline" id="activar-login">Iniciar Sesión</button>
                </div>
                <div class="info-panel info-derecha">
                    <h1 class="texto-blanco">¡Bienvenido!</h1>
                    <p class="texto-parrafo">Ingrese sus datos personales para usar todas las funciones del sitio</p>
                    <button class="boton-outline" id="activar-registro">Registrarse</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sesionusuario.js"></script>
</body>
</html>
